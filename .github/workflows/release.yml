name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF -replace '^refs/tags/','' } else { '${{ inputs.tag }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish src/TLJExplorer/TLJExplorer.csproj `
            -c Release -r ${{ matrix.rid }} --self-contained true `
            -p:DebugType=none -p:DebugSymbols=false `
            -o publish

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = "TLJExplorer-${{ steps.tag.outputs.tag }}-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish\* -DestinationPath $zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x publish/TLJExplorer
          archive="TLJExplorer-${{ steps.tag.outputs.tag }}-${{ matrix.rid }}.tar.gz"
          tar -czf "$archive" -C publish .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.rid }}
          path: TLJExplorer-${{ steps.tag.outputs.tag }}-${{ matrix.rid }}.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
